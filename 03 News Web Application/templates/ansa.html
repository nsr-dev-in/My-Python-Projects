<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansa News Web Application | Flask</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
body {
    background-color: #f4f6f8;
}

.news-card {
    transition: all 0.3s ease;
    border-radius: 12px;
}

.news-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.card-img-top {
    height: 220px;
    object-fit: cover;
}
</style>

</head>
<body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">📰 NewsHub</a>

    <div>
      <a class="btn btn-outline-light me-2" href="/">Al Jazeera</a>
      <a class="btn btn-outline-light" href="/bbc">BBC</a>
      <a class="btn btn-outline-light" href="/ansa">ANSA</a>
      <a class="btn btn-outline-light" href="/ars_technica">ARS Technica</a>
      <a class="btn btn-outline-light" href="/blasting_news">Blasting</a>
    </div>
  </div>
</nav>

    <div class="jumpotron" style="color: black">
        <h1 class="text-center mt-4">Ansa News</h1>
    </div>

    <div class="container mt-4">
  <div class="row">

    {% for news, desc, i in context %}
    <div class="col-md-4 mb-4">

      <div class="card news-card h-100 shadow-sm">

        {% if i %}
        <img src="{{ i }}" class="card-img-top">
        {% endif %}

        <div class="card-body">
          <h5 class="card-title">{{ news }}</h5>
          <p class="card-text">{{ desc }}</p>
        </div>

      </div>

    </div>
    {% endfor %}

  </div>
</div>

    

</div>

</body>
</html>
